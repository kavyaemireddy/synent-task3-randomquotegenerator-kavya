<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quotes Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Random Quote Generator</h1>

    <div id="quote-box">
      <p id="quote">Click below to get a quote</p>
      <h3 id="author"></h3>
    </div>

    <button id="btn">Get Quote</button>
    <p id="loading" class="hidden">Loading...</p>
    <p id="error" class="hidden">Something went wrong!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
